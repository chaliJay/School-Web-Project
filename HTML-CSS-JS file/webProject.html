<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Header Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="webProjectStyle.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <!-- Left: Menu & Logo -->
        <div class="header-left">
            <div class="logo-container">
                <img src="YouTube-Logosu.png" alt="YouTube Logo" class="yt-logo">
            </div>
            <div class="location">
                <i class="fa-solid fa-location-dot" ></i>
                <p class="location-name">Finland</p>
            </div>

        </div>

        <!-- Center: Search Bar -->
        <div class="header-center">
            <div class="search-container">
                <input type="text" placeholder="Search" class="search-input">
                <button class="search-btn">🔍</button>
            </div>
            <button class="mic-btn">🎙️</button>
        </div>

        <!-- Right: User Actions -->
        <div class="header-right">
            <button class="icon-btn notification-btn">
                🔔 <span class="badge">9+</span>
            </button>
            <button onclick="openLoginPage()" class="user-avatar">
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="video-section">
   <div class="filter-bar">
    <!-- Left Fade & Back Arrow -->
    <div class="btn-container left-fade" id="leftBtnContainer" style="display: none;">
        <button class="nav-btn" onclick="scrollLeftBtn()">❮</button>
    </div>

    <!-- The Scrollable Chips -->
    <div class="chips-wrapper" id="chipsWrapper">
        <span class="chip"><i class="fa-solid fa-bars" aria-colspan="menu-bar"></i></span>

        <span class="chip active">All</span>
        <span class="chip">Batter</span>
        <span class="chip">Virat Kohli</span>
        <span class="chip">Podcasts</span>
        <span class="chip">Masala films</span>
        <span class="chip">Ranveer Singh</span>
        <span class="chip">Comedy Nights with Kapil</span>
        <span class="chip">Thrillers</span>
        <span class="chip">Trailers</span>
        <span class="chip">Music</span>
        <span class="chip">Disha Vakani</span>
        <span class="chip">Gaming</span>
        <span class="chip">Live</span>
        <span class="chip">IPL 2026</span>
    </div>

    <!-- Right Fade & Next Arrow -->
    <div class="btn-container right-fade" id="rightBtnContainer">
        <button class="nav-btn" onclick="scrollRightBtn()">❯</button>
    </div>
</div>

    
</div>

        <!-- Colorful placeholder boxes -->
        <div class="video-grid">
            <div class="video-box" style="background-color: #ff5733;"></div>
            <div class="video-box" style="background-color: #33ff57;"></div>
            <div class="video-box" style="background-color: #3357ff;"></div>
            <div class="video-box" style="background-color: #f333ff;"></div>
            <div class="video-box" style="background-color: #ffbd33;"></div>
            <div class="video-box" style="background-color: #33fff3;"></div>
        </div>
    </main>

    <script src="index.js"></script>

</body>
</html>
